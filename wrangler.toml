name = "ajasky-pseo"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# workers.dev 서브도메인 차단 — ajasky-pseo.wormsz.workers.dev 가 본진과 동일 콘텐츠를
# 200으로 서빙해 중복 콘텐츠 노출면이 되던 것 제거 (커스텀 도메인 2개는 영향 없음).
workers_dev = false
preview_urls = false

[[d1_databases]]
binding = "DB"
database_name = "ajasky-pseo-db"
database_id = "7eebc245-8566-443d-b0ff-143d17e70f80"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "ajasky-media"

[vars]
# WORKER_API_TOKEN_HASH 는 `wrangler secret put` 로 별도 등록 (커밋 X)
# GITHUB_DISPATCH_TOKEN 도 동일 (`wrangler secret put GITHUB_DISPATCH_TOKEN`)

# 누락분 자동 복구 cron — 매시간 정각 UTC
# Worker가 D1으로 오늘 발행 수 체크 → 시간 대비 부족하면 GitHub workflow_dispatch 호출
[triggers]
crons = ["0 * * * *"]

# 도메인 라우팅 — 나중에 도메인 받으면 추가
# routes = [
#   { pattern = "ajasky.kr/*", custom_domain = true },
# ]
