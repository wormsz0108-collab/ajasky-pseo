name = "ajasky-pseo"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "ajasky-pseo-db"
database_id = "7eebc245-8566-443d-b0ff-143d17e70f80"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "ajasky-media"

[vars]
