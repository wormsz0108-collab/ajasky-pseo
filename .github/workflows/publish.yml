name: Daily Publish

# 하루 평균 25건 발행 (랜덤 변동 20~30건).
# 30개 cron 트리거 × 발행 확률 0.83 (PUBLISH_PROBABILITY) = 평균 25건/일.
#
# GitHub Actions 무료 한도(2,000분/월) 내 최대 페이스.
# 실 사용: 30 × 30일 × ~2분/run ≈ 1,800분/월 (무료 한도 90%).
#
# cron 시각은 UTC. KST = UTC + 9.
# 분 단위 모두 다름 (봇 탐지 회피).
# 분포: KST 기준 08~24시 빈도 높임 (정상 운영 시간대).

on:
  schedule:
    - cron: "13 0 * * *"     # KST 09:13
    - cron: "51 0 * * *"     # KST 09:51
    - cron: "38 1 * * *"     # KST 10:38
    - cron: "24 2 * * *"     # KST 11:24
    - cron: "9 3 * * *"      # KST 12:09
    - cron: "55 3 * * *"     # KST 12:55
    - cron: "42 4 * * *"     # KST 13:42
    - cron: "28 5 * * *"     # KST 14:28
    - cron: "14 6 * * *"     # KST 15:14
    - cron: "1 7 * * *"      # KST 16:01
    - cron: "47 7 * * *"     # KST 16:47
    - cron: "33 8 * * *"     # KST 17:33
    - cron: "19 9 * * *"     # KST 18:19
    - cron: "6 10 * * *"     # KST 19:06
    - cron: "52 10 * * *"    # KST 19:52
    - cron: "38 11 * * *"    # KST 20:38
    - cron: "25 12 * * *"    # KST 21:25
    - cron: "11 13 * * *"    # KST 22:11
    - cron: "57 13 * * *"    # KST 22:57
    - cron: "43 14 * * *"    # KST 23:43
    - cron: "30 15 * * *"    # KST 00:30
    - cron: "16 16 * * *"    # KST 01:16
    - cron: "2 17 * * *"     # KST 02:02
    - cron: "49 17 * * *"    # KST 02:49
    - cron: "35 18 * * *"    # KST 03:35
    - cron: "21 19 * * *"    # KST 04:21
    - cron: "7 20 * * *"     # KST 05:07
    - cron: "54 20 * * *"    # KST 05:54
    - cron: "40 21 * * *"    # KST 06:40
    - cron: "27 22 * * *"    # KST 07:27
  workflow_dispatch:
    inputs:
      force_run:
        description: "강제 발행 (확률 무시)"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: content-pipeline/requirements.txt

      - name: Install Noto CJK font (for OG image text overlay)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk

      - name: Install Python deps
        run: pip install -r content-pipeline/requirements.txt

      - name: Run publish cycle
        env:
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          WORKER_API_TOKEN:      ${{ secrets.WORKER_API_TOKEN }}
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:      ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
          WORKER_API:            https://ajasky.co.kr/api/posts
          SITE_DOMAIN:           ajasky.co.kr
          PUBLISH_PROBABILITY:   ${{ inputs.force_run == 'true' && '1.0' || '0.83' }}
        run: python content-pipeline/run_once.py
