name: Daily Publish

# 페이스: 25 cron 트리거/일 × 배치 2건 = 평균 50건/일 (네이버 일일 색인 요청 한도 맞춤).
#
# Public repo 라 GitHub Actions 무제한 무료.
# 한 run 안에서 2건 발행 → cron 트리거 횟수 줄여 오버헤드 ↓.
# 트리거 간격 평균 ~58분, 한 run 안 글 간격 15~30초 (Gemini rate limit 회피).
#
# cron 시각은 UTC. KST = UTC + 9. 분 단위 모두 다름 (봇 탐지 회피).
# GHA cron 누락 시 Worker hourly cron이 갭 감지해 workflow_dispatch 호출 (recovery.ts).

on:
  schedule:
    - cron: "7 0 * * *"      # KST 09:07
    - cron: "5 1 * * *"      # KST 10:05
    - cron: "3 2 * * *"      # KST 11:03
    - cron: "1 3 * * *"      # KST 12:01
    - cron: "59 3 * * *"     # KST 12:59
    - cron: "57 4 * * *"     # KST 13:57
    - cron: "55 5 * * *"     # KST 14:55
    - cron: "53 6 * * *"     # KST 15:53
    - cron: "51 7 * * *"     # KST 16:51
    - cron: "49 8 * * *"     # KST 17:49
    - cron: "47 9 * * *"     # KST 18:47
    - cron: "45 10 * * *"    # KST 19:45
    - cron: "43 11 * * *"    # KST 20:43
    - cron: "41 12 * * *"    # KST 21:41
    - cron: "39 13 * * *"    # KST 22:39
    - cron: "37 14 * * *"    # KST 23:37
    - cron: "35 15 * * *"    # KST 00:35
    - cron: "33 16 * * *"    # KST 01:33
    - cron: "31 17 * * *"    # KST 02:31
    - cron: "29 18 * * *"    # KST 03:29
    - cron: "27 19 * * *"    # KST 04:27
    - cron: "25 20 * * *"    # KST 05:25
    - cron: "23 21 * * *"    # KST 06:23
    - cron: "21 22 * * *"    # KST 07:21
    - cron: "19 23 * * *"    # KST 08:19
  workflow_dispatch:
    inputs:
      force_run:
        description: "강제 발행 (확률 무시)"
        type: boolean
        default: true
      batch_size:
        description: "한 번에 발행할 글 수"
        type: string
        default: "2"

permissions:
  contents: read

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: content-pipeline/requirements.txt

      - name: Install Noto CJK font (for OG image text overlay)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk

      - name: Install Python deps
        run: pip install -r content-pipeline/requirements.txt

      - name: Run publish cycle
        env:
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          WORKER_API_TOKEN:      ${{ secrets.WORKER_API_TOKEN }}
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:      ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
          WORKER_API:            https://ajasky.co.kr/api/posts
          SITE_DOMAIN:           ajasky.co.kr
          # 사이트별 지역 분담(미러/카니발 회피). ajasky=shard 0, wormsz1=shard 1.
          SITE_SHARD:            "0"
          SHARD_COUNT:           "2"
          PUBLISH_PROBABILITY:   ${{ inputs.force_run == 'true' && '1.0' || '1.0' }}
          PUBLISH_BATCH_SIZE:    ${{ inputs.batch_size || '2' }}
        run: python content-pipeline/run_once.py
